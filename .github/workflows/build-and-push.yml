name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - stage
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: container-builder
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set environment variables
        env:
          REPO: ${{ github.repository }}
          HUGGINGFACE_ACCESS_TOKEN: ${{ secrets.HUGGINGFACE_ACCESS_TOKEN }}
        run: |
          REGISTRY_REPO="ghcr.io/$(echo "$REPO" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          SHA="${GITHUB_SHA::7}"
          VERSION="${TIMESTAMP}-${SHA}"
          echo "REGISTRY_REPO=${REGISTRY_REPO}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "HUGGINGFACE_ACCESS_TOKEN=${HUGGINGFACE_ACCESS_TOKEN}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/bake-action@v2
        with:
          files: docker-bake.hcl
          push: true
          set: |
            *.args.REGISTRY_REPO=${{ env.REGISTRY_REPO }}
            *.args.IMAGE_NAME=${{ env.IMAGE_NAME }}
            *.args.RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            *.args.HUGGINGFACE_ACCESS_TOKEN=${{ env.HUGGINGFACE_ACCESS_TOKEN }}
