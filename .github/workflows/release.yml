name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  release:
    runs-on: container-builder

    if: ${{ !contains(github.event.head_commit.message, 'chore(release)') }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # - name: Clear space to remove unused folders
      #   run: |
      #     rm -rf /usr/share/dotnet
      #     rm -rf /opt/ghc
      #     rm -rf "/usr/local/share/boost"
      #     rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update the ToC in the README.md
        run: npx markdown-toc README.md -i

      - name: Semantic release
        uses: codfish/semantic-release-action@v3
        id: semanticrelease
        with:
          additional-packages: |
            ['@semantic-release/git', '@semantic-release/changelog', '@semantic-release/exec']
        env:
          GITHUB_TOKEN: ${{ secrets.BLIBLA_SEMANTIC_RELEASE }}

      - name: Set environment variables
        if: steps.semanticrelease.outputs.new-release-published == 'true'
        env:
          REPO: ${{ github.repository }}
          HUGGINGFACE_ACCESS_TOKEN: ${{ secrets.HUGGINGFACE_ACCESS_TOKEN }}
          RELEASE_VERSION: ${{ steps.semanticrelease.outputs.release-version }}
        run: |
          REGISTRY_REPO="ghcr.io/$(echo "$REPO" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY_REPO=${REGISTRY_REPO}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV
          echo "HUGGINGFACE_ACCESS_TOKEN=${HUGGINGFACE_ACCESS_TOKEN}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV

      - name: Build and push the images to GitHub Container Registry
        if: steps.semanticrelease.outputs.new-release-published == 'true'
        uses: docker/bake-action@v2
        with:
          files: docker-bake.hcl
          push: true
          set: |
            *.args.REGISTRY_REPO=${{ env.REGISTRY_REPO }}
            *.args.IMAGE_NAME=${{ env.IMAGE_NAME }}
            *.args.RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            *.args.HUGGINGFACE_ACCESS_TOKEN=${{ env.HUGGINGFACE_ACCESS_TOKEN }}
